services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}
    image: scheduly-backend
    networks:
      - scheduly-network
    ports:
      - '${PORT}:3000'
    restart: unless-stopped

  db:
    container_name: database
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      timeout: 5s
    image: postgres:alpine3.23
    networks:
      - scheduly-network
    ports:
      - '${DB_PORT}:5432'
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql

networks:
  scheduly-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
